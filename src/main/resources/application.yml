server:
  port: 8080

spring:
  application:
    name: streamrec
  datasource:
    url: jdbc:postgresql://localhost:5432/streamrec
    username: streamrec
    password: streamrec
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
