server:
  port: 8080

spring:
  application:
    name: streamrec
  datasource:
    url: jdbc:postgresql://localhost:5432/streamrec
    username: streamrec
    password: streamrec
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: streamrec-user-music-events
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.streamrec.dto
        spring.json.value.default.type: com.streamrec.dto.UserMusicEvent
        spring.json.use.type.headers: false
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

streamrec:
  cache:
    recommendation-ttl: PT1H
